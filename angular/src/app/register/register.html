<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
	<div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 w-100" style="max-width: 520px;">
		<h2 class="h3 mb-4 text-center">Register</h2>

    <div *ngIf="message" class="alert mt-3 mb-0" [class.alert-danger]="isError" [class.alert-success]="!isError">
			{{ message }}
		</div>

		<form (ngSubmit)="register(registerForm)" #registerForm="ngForm" class="d-grid gap-3">
			<div>
				<label class="form-label">Name</label>
				<input
					type="text"
					class="form-control form-control-lg"
					name="name"
					#nameModel="ngModel"
					required
					minlength="2"
					[(ngModel)]="user.name"
					placeholder="Enter your name"
					[class.is-invalid]="(submitAttempted || nameModel.touched) && nameModel.invalid"
				/>
				<div class="text-danger small mt-1" *ngIf="(submitAttempted || nameModel.touched) && nameModel.errors?.['required']">
					Name is required.
				</div>
				<div class="text-danger small mt-1" *ngIf="(submitAttempted || nameModel.touched) && nameModel.errors?.['minlength']">
					Name must be at least 2 characters.
				</div>
			</div>

			<div>
				<label class="form-label">Email</label>
				<input
					type="email"
					class="form-control form-control-lg"
					name="email"
					#emailModel="ngModel"
					required
					[(ngModel)]="user.email"
					placeholder="Enter your email"
					[class.is-invalid]="(submitAttempted || emailModel.touched) && emailModel.invalid"
				/>
				<div class="text-danger small mt-1" *ngIf="(submitAttempted || emailModel.touched) && emailModel.errors?.['required']">
					Email is required.
				</div>
				<div class="text-danger small mt-1" *ngIf="(submitAttempted || emailModel.touched) && emailModel.errors?.['email']">
					Enter a valid email address.
				</div>
			</div>

			<div>
				<label class="form-label">Password</label>
				<input
					type="password"
					class="form-control form-control-lg"
					name="password"
					#passwordModel="ngModel"
					required
					minlength="6"
					[(ngModel)]="user.password"
					placeholder="Create a password"
					[class.is-invalid]="(submitAttempted || passwordModel.touched) && passwordModel.invalid"
				/>
				<div class="text-danger small mt-1" *ngIf="(submitAttempted || passwordModel.touched) && passwordModel.errors?.['required']">
					Password is required.
				</div>
				<div class="text-danger small mt-1" *ngIf="(submitAttempted || passwordModel.touched) && passwordModel.errors?.['minlength']">
					Password must be at least 6 characters.
				</div>
			</div>

			<button class="btn btn-primary btn-lg" type="submit" [disabled]="registerForm.invalid || isSubmitting">
				{{ isSubmitting ? 'Registering...' : 'Register' }}
			</button>
		</form>



		<p class="text-center mt-4 mb-0">
			Already have an account?
			<a routerLink="/login">Login</a>
		</p>
	</div>
</div>
